name: Metadata CI

on:
  push:
    branches:
      - main
      - hotfix/**
  pull_request:

permissions:
  contents: read

jobs:
  validate-repository-metadata:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate repository state
        shell: powershell
        run: powershell -ExecutionPolicy Bypass -File .\scripts\Test-RepositoryState.ps1
