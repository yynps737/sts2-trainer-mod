name: Draft Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: Manifest version from Sts2Trainer.json
        required: true
        type: string
      include_symbols:
        description: Publish a separate symbols zip with the PDB
        required: true
        default: false
        type: boolean

permissions:
  contents: write

concurrency:
  group: draft-release-${{ inputs.version }}
  cancel-in-progress: false

jobs:
  draft-release:
    runs-on:
      - self-hosted
      - windows

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x

      - name: Guard release source branch
        shell: powershell
        run: |
          $refType = '${{ github.ref_type }}'
          $refName = '${{ github.ref_name }}'
          if ($refType -ne 'branch') {
            throw "Draft releases must be dispatched from a branch ref."
          }

          if ($refName -ne 'main' -and -not $refName.StartsWith('hotfix/')) {
            throw "Draft releases are only allowed from main or hotfix/* branches. Current ref: $refName"
          }

          Write-Host "Release source verified: $refName"

      - name: Validate release environment
        shell: powershell
        run: powershell -ExecutionPolicy Bypass -File .\scripts\Test-ReleaseEnvironment.ps1 -RequireGitHubCli

      - name: Validate repository state
        shell: powershell
        run: powershell -ExecutionPolicy Bypass -File .\scripts\Test-RepositoryState.ps1

      - name: Build release package
        shell: powershell
        run: powershell -ExecutionPolicy Bypass -File .\scripts\Invoke-ReleaseBuild.ps1 -Version '${{ inputs.version }}' -IncludePdb:${{ inputs.include_symbols }} -SkipRepositoryStateCheck

      - name: Create draft GitHub release
        shell: powershell
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $manifest = Get-Content -Encoding UTF8 .\src\Sts2Trainer.Mod\Sts2Trainer.json | ConvertFrom-Json
          $constants = Get-Content -Raw -Encoding UTF8 .\src\Sts2Trainer.Shared\TrainerConstants.cs
          $gameVersion = [regex]::Match($constants, 'SupportedGameVersion = "([^"]+)"').Groups[1].Value
          $tag = "v${{ inputs.version }}"
          $title = "STS2 Trainer v${{ inputs.version }} for STS2 $gameVersion (Windows Steam)"
          $notesFile = (Resolve-Path .\artifacts\release\release-notes.md).Path
          $checksumFile = (Resolve-Path .\artifacts\release\SHA256SUMS.txt).Path
          $zipAssets = Get-ChildItem .\artifacts\release\*.zip -File | ForEach-Object { $_.FullName }

          gh release view $tag 2>$null | Out-Null
          if ($LASTEXITCODE -eq 0) {
            throw "Release already exists for tag $tag"
          }

          if (-not $zipAssets) {
            throw 'No release zip assets were generated.'
          }

          $arguments = @(
            'release', 'create', $tag,
            '--target', $env:GITHUB_SHA,
            '--draft',
            '--title', $title,
            '--notes-file', $notesFile
          )

          if ('${{ inputs.version }}' -match '-') {
            $arguments += '--prerelease'
          }

          $arguments += $zipAssets
          $arguments += $checksumFile
          gh @arguments
          if ($LASTEXITCODE -ne 0) {
            throw "gh release create failed with exit code $LASTEXITCODE"
          }
