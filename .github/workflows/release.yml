name: Publish Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: Existing tag to publish or repair
        required: true
        type: string
      draft:
        description: Keep the release as draft
        required: true
        default: false
        type: boolean
      include_symbols:
        description: Publish a separate symbols zip with the PDB
        required: true
        default: false
        type: boolean

permissions:
  contents: write

concurrency:
  group: publish-release-${{ github.ref_name || inputs.tag }}
  cancel-in-progress: false

jobs:
  publish-release:
    runs-on:
      - self-hosted
      - windows
      - x64
      - sts2-build

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x

      - name: Resolve tag and version
        id: release_vars
        shell: powershell
        run: |
          if ('${{ github.event_name }}' -eq 'push') {
            $tag = '${{ github.ref_name }}'
            $draft = 'false'
            $includeSymbols = 'false'
          } else {
            $rawTag = '${{ inputs.tag }}'
            $tag = if ($rawTag.StartsWith('v')) { $rawTag } else { "v$rawTag" }
            $draft = '${{ inputs.draft }}'.ToLowerInvariant()
            $includeSymbols = '${{ inputs.include_symbols }}'.ToLowerInvariant()
          }

          if ($tag -notmatch '^v\d+\.\d+\.\d+(?:-[0-9A-Za-z.-]+)?$') {
            throw "Invalid release tag: $tag"
          }

          $version = $tag.Substring(1)
          "tag=$tag" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          "version=$version" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          "draft=$draft" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          "include_symbols=$includeSymbols" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Verify tag exists remotely
        shell: powershell
        run: |
          git fetch --tags --force
          git rev-parse '${{ steps.release_vars.outputs.tag }}' | Out-Null
          if ($LASTEXITCODE -ne 0) {
            throw "Tag not found: ${{ steps.release_vars.outputs.tag }}"
          }

      - name: Validate release environment
        shell: powershell
        run: powershell -ExecutionPolicy Bypass -File .\scripts\Test-ReleaseEnvironment.ps1 -RequireGitHubCli

      - name: Validate repository state
        shell: powershell
        run: powershell -ExecutionPolicy Bypass -File .\scripts\Test-RepositoryState.ps1

      - name: Build release package
        shell: powershell
        run: powershell -ExecutionPolicy Bypass -File .\scripts\Invoke-ReleaseBuild.ps1 -Version '${{ steps.release_vars.outputs.version }}' -IncludePdb:${{ steps.release_vars.outputs.include_symbols }} -SkipRepositoryStateCheck

      - name: Create or update GitHub release
        shell: powershell
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $tag = '${{ steps.release_vars.outputs.tag }}'
          $version = '${{ steps.release_vars.outputs.version }}'
          $draft = '${{ steps.release_vars.outputs.draft }}' -eq 'true'
          $isPrerelease = $version.Contains('-')

          $manifest = Get-Content -Encoding UTF8 .\src\Sts2Trainer.Mod\Sts2Trainer.json | ConvertFrom-Json
          if ($manifest.version -ne $version) {
            throw "Manifest version '$($manifest.version)' does not match release version '$version'."
          }

          $constants = Get-Content -Raw -Encoding UTF8 .\src\Sts2Trainer.Shared\TrainerConstants.cs
          $gameVersion = [regex]::Match($constants, 'SupportedGameVersion = "([^"]+)"').Groups[1].Value
          $title = "STS2 Trainer $tag for STS2 $gameVersion (Windows Steam)"
          $notesFile = (Resolve-Path .\artifacts\release\release-notes.md).Path
          $checksumFile = (Resolve-Path .\artifacts\release\SHA256SUMS.txt).Path
          $metadataFile = (Resolve-Path .\artifacts\release\release-metadata.json).Path
          $zipAssets = Get-ChildItem .\artifacts\release\*.zip -File | ForEach-Object { $_.FullName }

          if (-not $zipAssets) {
            throw 'No release zip assets were generated.'
          }

          gh release view $tag >$null 2>$null
          $releaseExists = ($LASTEXITCODE -eq 0)

          if (-not $releaseExists) {
            $createArguments = @(
              'release', 'create', $tag,
              '--verify-tag',
              '--title', $title,
              '--notes-file', $notesFile
            )

            if ($draft) {
              $createArguments += '--draft'
            }

            if ($isPrerelease) {
              $createArguments += '--prerelease'
            }

            $createArguments += $zipAssets
            $createArguments += $checksumFile
            $createArguments += $metadataFile
            gh @createArguments
            if ($LASTEXITCODE -ne 0) {
              throw "gh release create failed with exit code $LASTEXITCODE"
            }
            exit 0
          }

          gh release upload $tag $zipAssets $checksumFile $metadataFile --clobber
          if ($LASTEXITCODE -ne 0) {
            throw "gh release upload failed with exit code $LASTEXITCODE"
          }

          $editArguments = @(
            'release', 'edit', $tag,
            '--verify-tag',
            '--title', $title,
            '--notes-file', $notesFile
          )

          if ($draft) {
            $editArguments += '--draft'
          } else {
            $editArguments += '--draft=false'
          }

          if ($isPrerelease) {
            $editArguments += '--prerelease'
          } else {
            $editArguments += '--prerelease=false'
          }

          gh @editArguments
          if ($LASTEXITCODE -ne 0) {
            throw "gh release edit failed with exit code $LASTEXITCODE"
          }
